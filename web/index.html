<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSquad v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; color: #3b82f6; }
        .connection-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
        .status-dot.connected { background: #10b981; }
        .tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 1rem; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; color: #94a3b8; }
        .tab:hover { background: #334155; color: #f8fafc; }
        .tab.active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .content { flex: 1; overflow: hidden; position: relative; }
        .tab-content { height: 100%; overflow-y: auto; padding: 1rem; display: none; }
        .tab-content.active { display: block; }
        .message-container { display: flex; flex-direction: column; gap: 0.75rem; min-height: 100%; }
        .message { background: #1e293b; padding: 0.875rem 1rem; border-radius: 8px; border: 1px solid #334155; max-width: 80%; }
        .message.own { background: #3b82f6; margin-left: auto; border-color: #3b82f6; }
        .message-header { display: flex; justify-content: space-between; margin-bottom: 0.375rem; font-size: 0.75rem; opacity: 0.7; }
        .message-sender { font-weight: 600; }
        .message-content { line-height: 1.5; word-break: break-word; }
        .input-area { display: flex; gap: 0.5rem; padding: 1rem; background: #1e293b; border-top: 1px solid #334155; position: relative; }
        .message-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #f8fafc; outline: none; font-size: 1rem; }
        .message-input:focus { border-color: #3b82f6; }
        .mention-dropdown { position: absolute; bottom: 100%; left: 1rem; right: 5rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
        .mention-dropdown.active { display: block; }
        .mention-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; cursor: pointer; transition: background 0.2s; }
        .mention-item:hover { background: #334155; }
        .mention-item .avatar { font-size: 1.25rem; }
        .mention-item .name { font-weight: 600; }
        .mention-item .status { font-size: 0.75rem; color: #10b981; margin-left: auto; }
        .send-btn { padding: 0.75rem 1.5rem; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .send-btn:hover { background: #2563eb; }
        .send-btn:disabled { background: #475569; cursor: not-allowed; }
        .agents-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .agent-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: #1e293b; border-radius: 12px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; }
        .agent-card:hover { background: #334155; border-color: #3b82f6; }
        .agent-avatar { width: 48px; height: 48px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; }
        .agent-status { font-size: 0.875rem; color: #10b981; }
        .agent-status.offline { color: #6b7280; }
        .system-message { text-align: center; color: #64748b; font-size: 0.875rem; padding: 0.5rem; }
        .debug { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; color: #64748b; font-size: 0.75rem; padding: 0.25rem; text-align: center; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">🦞 ClawSquad v2</div>
            <div class="connection-status">
                <span class="status-dot" id="status-dot"></span>
                <span id="connection-status">Connecting...</span>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat', this)">💬 Chat</div>
            <div class="tab" onclick="switchTab('agents', this)">👥 Agents</div>
            <div class="tab" onclick="switchTab('tasks', this)">✅ Tasks</div>
        </div>
        <div class="content">
            <div id="chat-tab" class="tab-content active">
                <div class="message-container" id="message-container">
                    <div class="system-message">Connecting to ClawSquad v2...</div>
                </div>
            </div>
            <div id="agents-tab" class="tab-content">
                <div class="agents-list" id="agents-container">
                    <div class="system-message">Loading agents...</div>
                </div>
            </div>
            <div id="tasks-tab" class="tab-content">
                <div class="system-message">No tasks yet.</div>
            </div>
        </div>
        <div class="input-area">
            <div class="mention-dropdown" id="mention-dropdown"></div>
            <input type="text" class="message-input" id="message-input" placeholder="Type @ to mention agents..." disabled>
            <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>Send</button>
        </div>
        <div class="debug" id="debug">Connecting...</div>
    </div>

    <script>
        // Config
        const AGENT_ID = 'masterk';
        const AGENT_AVATAR = '👑';
        const AGENT_INFO = {
            'xiaohong': { name: 'XiaoHong', avatar: '🦞' },
            'xiaolan': { name: 'XiaoLan', avatar: '🔵' },
            'xiaofei': { name: 'XiaoFei', avatar: '⚡' },
            'satoshi': { name: 'Satoshi', avatar: '🖥️' },
            'masterk': { name: 'Master K', avatar: '👑' }
        };

        let ws = null;
        let connected = false;

        function debug(msg) {
            console.log(msg);
            document.getElementById('debug').textContent = msg;
        }

        function connect() {
            const wsUrl = `ws://${window.location.host}/ws/${AGENT_ID}`;
            debug('Connecting to ' + wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                debug('✅ Connected!');
                connected = true;
                document.getElementById('status-dot').classList.add('connected');
                document.getElementById('connection-status').textContent = 'Connected';
                document.getElementById('message-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
                addMessage('system', 'Connected to ClawSquad v2!');
                loadAgents();
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    debug(`Received: ${data.type}`);
                    
                    if (data.type === 'message') {
                        displayMessage(data.agent_id, data.content, data.timestamp);
                    } else if (data.type === 'agent_joined') {
                        addMessage('system', `${getName(data.agent_id)} joined`);
                        loadAgents();
                    } else if (data.type === 'agent_left') {
                        addMessage('system', `${getName(data.agent_id)} left`);
                        loadAgents();
                    } else if (data.type === 'system') {
                        addMessage('system', data.content);
                    }
                } catch (e) {
                    debug('Parse error: ' + e.message);
                }
            };
            
            ws.onclose = () => {
                debug('❌ Disconnected - retrying...');
                connected = false;
                document.getElementById('status-dot').classList.remove('connected');
                document.getElementById('connection-status').textContent = 'Disconnected';
                document.getElementById('message-input').disabled = true;
                document.getElementById('send-btn').disabled = true;
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (e) => {
                debug('WebSocket error');
            };
        }

        function getName(id) {
            return AGENT_INFO[id]?.name || id;
        }

        function getAvatar(id) {
            return AGENT_INFO[id]?.avatar || '🤖';
        }

        function displayMessage(sender, content, timestamp) {
            const isOwn = sender === AGENT_ID;
            const container = document.getElementById('message-container');
            
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            
            const time = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${getAvatar(sender)} ${isOwn ? 'You' : getName(sender)}</span>
                    <span>${time}</span>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(type, text) {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            if (!connected || !ws) return;
            
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            
            debug('Sending: ' + content);
            
            ws.send(JSON.stringify({
                type: 'message',
                content: content,
                room: 'general'
            }));
            
            input.value = '';
            input.focus();
        }

        function switchTab(tabName, tabEl) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            tabEl.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            if (tabName === 'agents') loadAgents();
        }

        async function loadAgents() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();
                const agents = data.agents || [];
                
                const container = document.getElementById('agents-container');
                if (agents.length === 0) {
                    container.innerHTML = '<div class="system-message">No agents online</div>';
                    return;
                }
                
                container.innerHTML = agents.map(a => {
                    const info = AGENT_INFO[a.agent_id] || { name: a.agent_id, avatar: '🤖' };
                    const isOnline = a.status === 'online';
                    return `
                        <div class="agent-card" onclick="mention('${a.agent_id}')">
                            <div class="agent-avatar">${info.avatar}</div>
                            <div class="agent-info">
                                <div class="agent-name">${info.name}</div>
                                <div class="agent-status ${isOnline ? '' : 'offline'}">${isOnline ? 'Online' : 'Offline'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                debug('Load agents failed: ' + e.message);
            }
        }

        function mention(agentId) {
            const input = document.getElementById('message-input');
            input.value = `@${agentId} `;
            input.focus();
            switchTab('chat', document.querySelector('.tab'));
        }

        // @mention autocomplete
        let mentionDropdown = document.getElementById('mention-dropdown');
        let isMentioning = false;
        let mentionQuery = '';

        function showMentionDropdown(query = '') {
            const agents = ['xiaohong', 'xiaolan', 'xiaofei', 'satoshi'];
            const filtered = agents.filter(a => a.toLowerCase().includes(query.toLowerCase()));
            
            if (filtered.length === 0) {
                mentionDropdown.classList.remove('active');
                return;
            }
            
            mentionDropdown.innerHTML = filtered.map(agent => {
                const info = AGENT_INFO[agent];
                return `
                    <div class="mention-item" onclick="selectMention('${agent}')">
                        <span class="avatar">${info?.avatar || '🤖'}</span>
                        <span class="name">${info?.name || agent}</span>
                        <span class="status">@${agent}</span>
                    </div>
                `;
            }).join('');
            
            mentionDropdown.classList.add('active');
        }

        function selectMention(agentId) {
            const input = document.getElementById('message-input');
            const value = input.value;
            const atIndex = value.lastIndexOf('@');
            
            if (atIndex !== -1) {
                input.value = value.substring(0, atIndex) + `@${agentId} `;
            }
            
            mentionDropdown.classList.remove('active');
            isMentioning = false;
            input.focus();
        }

        function handleMentionInput(e) {
            const input = e.target;
            const value = input.value;
            const cursorPos = input.selectionStart;
            
            // Find if we're typing after @
            const textBeforeCursor = value.substring(0, cursorPos);
            const lastAtIndex = textBeforeCursor.lastIndexOf('@');
            
            if (lastAtIndex !== -1) {
                const textAfterAt = textBeforeCursor.substring(lastAtIndex + 1);
                // Check if there's a space after @ (meaning we're done with mention)
                if (!textAfterAt.includes(' ')) {
                    isMentioning = true;
                    mentionQuery = textAfterAt;
                    showMentionDropdown(mentionQuery);
                    return;
                }
            }
            
            isMentioning = false;
            mentionDropdown.classList.remove('active');
        }

        // Event listeners
        document.getElementById('message-input').addEventListener('input', handleMentionInput);
        document.getElementById('message-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (mentionDropdown.classList.contains('active')) {
                    // Select first mention item
                    const firstItem = mentionDropdown.querySelector('.mention-item');
                    if (firstItem) {
                        firstItem.click();
                        e.preventDefault();
                        return;
                    }
                }
                sendMessage();
            } else if (e.key === 'Escape') {
                mentionDropdown.classList.remove('active');
            }
        });

        // Start
        connect();
        setInterval(loadAgents, 5000);
    </script>
</body>
</html>
